<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Resume History
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .card{
            border:none;
            border-radius:18px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/">

            AI Job Recommendation

        </a>

        <div>

            <a href="/dashboard"
               class="btn btn-primary btn-sm">

                Dashboard

            </a>

            <a href="/about"
               class="btn btn-warning btn-sm">

                About

            </a>

            <a href="/logout"
               class="btn btn-danger btn-sm">

                Logout

            </a>

        </div>

    </div>

</nav>

<!-- MAIN CONTENT -->

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-primary mb-4">

            Resume Upload History

        </h2>

        {% if history %}

        <table class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>
                        Recommended Role
                    </th>

                    <th>
                        Resume Score
                    </th>

                    <th>
                        Extracted Skills
                    </th>

                </tr>

            </thead>

            <tbody>

                {% for item in history %}

                <tr>

                    <td>

                        {{ item.top_role }}

                    </td>

                    <td>

                        {{ item.score }}%

                    </td>

                    <td>

                        {{ item.skills | join(', ') }}

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        {% else %}

        <div class="alert alert-info">

            No upload history found.

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
