<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Upload History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">

        Upload History

    </h1>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>

                <th>Resume</th>

                <th>Score</th>

                <th>Recommended Jobs</th>

            </tr>

        </thead>

        <tbody>

            {% for item in history %}

            <tr>

                <td>{{ item.filename }}</td>

                <td>{{ item.resume_score }}%</td>

                <td>{{ item.recommended_jobs }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
