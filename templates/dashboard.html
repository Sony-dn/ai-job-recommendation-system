<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        .navbar {
            background: #333;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>My Dashboard</div>
    <div>
        <a href="/dashboard">Home</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">

        <h2>Welcome 👋</h2>

        <!-- Flask dynamic username -->
        <p>Hello, {{ username }}!</p>

        <p>You are successfully logged in.</p>

    </div>

</div>

</body>
</html>
